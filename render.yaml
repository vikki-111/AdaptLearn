services:
  # Main Java Spring Boot application
  - type: web
    name: adapt-learn-backend
    runtime: java
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/adapt-learn-0.0.1-SNAPSHOT.jar --server.port=$PORT"
    envVars:
      - key: DB_URL
        fromDatabase:
          name: adapt-learn-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: adapt-learn-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: adapt-learn-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: adapt-learn-ai
          property: host

  # Python AI service
  - type: web
    name: adapt-learn-ai
    runtime: python3
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # You'll need to set this manually in Render dashboard

  # PostgreSQL database
  - type: pserv
    name: adapt-learn-db
    runtime: postgresql
    databaseName: adapt_learn
    user: adapt_learn_user
    ipAllowList: [] # Only accessible by other services in this blueprint
