services:
  # Java Spring Boot Backend
  - type: web
    name: adapt-learn-backend
    runtime: java
    region: oregon
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/adapt-learn-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: DB_HOST
        fromDatabase:
          name: adapt-learn-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: adapt-learn-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: adapt-learn-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: adapt-learn-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: adapt-learn-db
          property: password
      - key: AI_SERVICE_URL
        value: http://adapt-learn-ai:10000
      - key: JWT_EXPIRATION
        value: 86400000

  # Python AI Service
  - type: web
    name: adapt-learn-ai
    runtime: python
    region: oregon
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: 10000

databases:
  - name: adapt-learn-db
    databaseName: adapt_learn
    user: adapt_user
    region: oregon
