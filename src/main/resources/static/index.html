<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Bot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🤖 AI Chat Bot</h1>
        <button class="reset-btn" onclick="resetConversation()">Reset Conversation</button>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">Hello! I'm your AI assistant. How can I help you today?</div>
        </div>
        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Type your message...">
            <button onclick="sendMessage()" id="sendBtn">Send</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🤖 AI Chat Bot</h1>
            <button onclick="window.location.href='assessment.html'" style="background: #2ecc71;">Take Test</button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
