<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdaptLearn - Register</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container" style="height: auto; max-width: 500px;">
        <h1>🚀 Join AdaptLearn</h1>
        <p class="text-center" style="color: #666; margin-bottom: 30px;">
            Start your personalized learning journey today
        </p>

        <div id="error" class="error-message" style="display: none;">
            Registration failed. Please check your information and try again.
        </div>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Choose a username" required>
                <input type="email" id="email" placeholder="Enter your email address" required>
                <input type="password" id="password" placeholder="Create a secure password" required>
                <button type="submit" class="btn-primary" style="width: 100%;">Create My Account</button>
            </div>
        </form>

        <div class="text-center mt-20">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>

        <div class="text-center mt-20">
            <p style="color: #666; font-size: 14px;">
                🎯 AI-powered assessments • 📊 Progress tracking • 🎓 Personalized learning
            </p>
        </div>
    </div>

    <script src="/js/register.js"></script>
</body>
</html>
